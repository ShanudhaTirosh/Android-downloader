name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:     [ "v*.*.*" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ShanuFxAndroid.zip
        run: |
          unzip -o -q ShanuFxAndroid.zip
          cp -r ShanuFxAndroid/. .
          rm -rf ShanuFxAndroid

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            lld ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Rename APK
        run: |
          cp $(find bin/ -name "*.apk" | head -1) bin/ShanuFxDownloader.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShanuFxDownloader-APK
          path: bin/ShanuFxDownloader.apk
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Shanu Fx Downloader ${{ github.ref_name }}"
          body: |
            ## 📱 Shanu Fx Downloader ${{ github.ref_name }}

            ### 📥 Tap `ShanuFxDownloader.apk` below to download

            ### 📲 Installation
            1. Download the APK to your Android phone
            2. Tap it and allow installation from unknown sources
            3. Tap **Install**

            ### ✅ Requirements
            - Android 7.0+ (API 24+)
          files: bin/ShanuFxDownloader.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ════════════════════════════════════════════════════════════════
#  Shanu Fx Downloader — GitHub Actions: Build Android APK
#
#  Triggers:
#    • Push to main/master
#    • Version tag  (v1.0.0 → creates a GitHub Release with APK)
#    • Manual trigger
#
#  Output:
#    • ShanuFxDownloader.apk  attached to GitHub Release
#    • Also available as artifact for 7 days
# ════════════════════════════════════════════════════════════════

name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:     [ "v*.*.*" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04      # Buildozer works best on Ubuntu

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Extract project zip to repo root ──────────────────────────────────
      # The zip was uploaded via the GitHub WebUI; extract it so the project
      # files land at the repo root inside ShanuFxAndroid/
      - name: Extract ShanuFxAndroid.zip
        run: |
          unzip -q ShanuFxAndroid.zip
          echo "── Extracted contents ──"
          ls -la ShanuFxAndroid/

      # ── 3. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Install system dependencies ───────────────────────────────────────
      # These are required by Buildozer / python-for-android
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            lld ccache

      # ── 5. Install Buildozer and Cython ──────────────────────────────────────
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36
          buildozer --version

      # ── 6. Cache Android SDK, NDK, and p4a build ─────────────────────────────
      # This saves ~15 mins on subsequent builds
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('ShanuFxAndroid/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 7. Set JAVA_HOME ─────────────────────────────────────────────────────
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # ── 8. Build the APK ─────────────────────────────────────────────────────
      # cd into the extracted project folder before running buildozer.
      # Buildozer reads buildozer.spec from the current directory.
      # Android SDK licences are accepted automatically via the env var.
      - name: Build APK
        working-directory: ShanuFxAndroid
        run: |
          buildozer -v android debug 2>&1 | tee ../build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_SDK_ROOT: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          # Suppress the interactive licence prompt inside Buildozer
          BUILDOZER_WARN_ON_ROOT: 0

      # ── 9. Accept Android SDK licences (post-SDK-download) ───────────────────
      # sdkmanager is only present after Buildozer has downloaded the SDK.
      # We run it here, after the build, so that re-runs never stall on prompts.
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || \
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            --licenses 2>/dev/null || true

      # ── 10. Rename APK to clean filename ─────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find ShanuFxAndroid/bin/ -name "*.apk" | head -1)
          cp "$APK" ShanuFxAndroid/bin/ShanuFxDownloader.apk
          echo "APK size: $(du -sh ShanuFxAndroid/bin/ShanuFxDownloader.apk | cut -f1)"
          ls -lh ShanuFxAndroid/bin/

      # ── 11. Upload as artifact ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShanuFxDownloader-Android-APK
          path: ShanuFxAndroid/bin/ShanuFxDownloader.apk
          retention-days: 7

      # ── 12. Upload build log on failure ──────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      # ── 13. Create GitHub Release (on version tags only) ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Shanu Fx Downloader ${{ github.ref_name }} — Android"
          body: |
            ## 📱 Shanu Fx Private Downloader ${{ github.ref_name }} — Android APK

            ### 📥 Download
            👇 **Tap `ShanuFxDownloader.apk` below to download**

            ### 📲 Installation
            1. Download the APK to your Android phone
            2. Open it — Android will ask to allow installation from unknown sources
            3. Tap **Install**
            4. Done! Find **Shanu Fx Downloader** in your app list

            ### ✅ Requirements
            - Android 7.0+ (API 24+)
            - Allow "Install unknown apps" permission for your browser/file manager

            ### 🚀 Features
            - Download from YouTube, TikTok, Instagram, Facebook + 1000 sites
            - Multi-threaded download manager
            - Download history
            - Dark glassmorphism UI

            ---
            Built automatically by GitHub Actions · by [Shanudha Tirosh](https://github.com/ShanudhaTirosh)
          files: ShanuFxAndroid/bin/ShanuFxDownloader.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
